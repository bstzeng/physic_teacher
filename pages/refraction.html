<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>光的折射 | 物理小老師</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/concept.css" />
  </head>
  <body data-concept-id="refraction">
    <main class="concept-page">
      <header class="concept-hero">
        <a class="home-link" href="../index.html">回首頁</a>
        <div class="hero-text-block">
          <p class="badge" data-role="level"></p>
          <h1 data-role="title"></h1>
          <p class="lead" data-role="summary"></p>
        </div>
      </header>

      <section class="concept-layout">
        <article class="stage-card">
          <div class="card-head">
            <h2>折射實驗</h2>
            <p>光線從空氣進入不同介質時，會改變方向。</p>
          </div>
          <div class="scene-shell svg-stage">
            <svg viewBox="0 0 600 320" aria-label="折射互動圖">
              <rect width="600" height="320" fill="#f8fcff"></rect>
              <rect id="mediumRect" x="0" y="160" width="600" height="160" fill="#c6ecff"></rect>
              <line x1="300" y1="20" x2="300" y2="300" stroke="#8d99ae" stroke-width="4" stroke-dasharray="8 8"></line>
              <line id="incidentRay" x1="220" y1="30" x2="300" y2="160" stroke="#f77f00" stroke-width="6" stroke-linecap="round"></line>
              <line id="refractedRay" x1="300" y1="160" x2="360" y2="290" stroke="#0077b6" stroke-width="6" stroke-linecap="round"></line>
              <circle cx="300" cy="160" r="8" fill="#30475e"></circle>
            </svg>
          </div>
        </article>

        <aside class="control-card">
          <div class="card-head">
            <h2>控制面板</h2>
            <p>介質越不一樣，光線偏折通常越明顯。</p>
          </div>
          <div class="segmented-row">
            <button class="medium-button active" data-medium="water" type="button">水</button>
            <button class="medium-button" data-medium="glass" type="button">玻璃</button>
            <button class="medium-button" data-medium="oil" type="button">油</button>
          </div>
          <label class="control-group">
            <span>入射角度：<strong id="incidentValue">32</strong> 度</span>
            <input id="incidentRange" type="range" min="10" max="60" value="32" />
          </label>

          <div class="stat-list">
            <div class="stat-item">
              <span>介質</span>
              <strong id="mediumText">水</strong>
            </div>
            <div class="stat-item">
              <span>折射角度</span>
              <strong id="refractedValue">24 度</strong>
            </div>
            <div class="stat-item">
              <span>觀察提示</span>
              <strong id="refractionTip">換成玻璃看看，光線會更靠近中線。</strong>
            </div>
          </div>
        </aside>
      </section>

      <section class="lesson-grid">
        <article class="lesson-card">
          <h2>你會發現什麼？</h2>
          <ul>
            <li>光進入不同介質時，方向會改變。</li>
            <li>有些介質會讓光線更靠近中線。</li>
            <li>入射角變大時，折射角也會跟著變。</li>
          </ul>
        </article>
        <article class="lesson-card">
          <h2>小挑戰</h2>
          <p>把入射角調大，再切換水和玻璃，比較哪一種介質讓光線偏得更多。</p>
        </article>
      </section>
    </main>

    <script src="../assets/js/data/concepts.js"></script>
    <script src="../assets/js/core/concept-page.js"></script>
    <script src="../assets/js/concepts/refraction.js"></script>
  </body>
</html>
